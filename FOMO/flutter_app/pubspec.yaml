name: privmesh
description: Private encrypted LAN mesh messenger with calling
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State management ─────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── UI & animations ──────────────────────────────────
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  lottie: ^3.1.0

  # ── Persistence ──────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Secure storage (Android/iOS) ─────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Media & Camera ───────────────────────────────────
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  file_picker: ^8.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.3

  # ── Permissions ──────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Biometric & crypto ───────────────────────────────────────────────────────
  local_auth: ^2.3.0
  crypto: ^3.0.3

  # ── NFC ──────────────────────────────────────────────────────────────────────
  nfc_manager: ^3.3.0

  # ── Wallet / QR scanner ──────────────────────────────────────────────────────
  mobile_scanner: ^6.0.2
  google_mlkit_text_recognition: ^0.13.1

  # ── Utilities ────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
